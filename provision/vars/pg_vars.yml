---

master_host: "192.168.56.10"
replica_host: "192.168.56.11"

pg_version: 18
cluster_name: "main"
pg_data: "/pg_data/{{ pg_version }}/{{ cluster_name }}"
pg_wal: "/pg_wal"

postgres_apt_packages:
- "postgresql-{{ pg_version }}"
- "postgresql-{{ pg_version }}-repack" 
- "postgresql-{{ pg_version }}-dbgsym" 
- "postgresql-client-{{ pg_version }}"
- "python3-pysyncobj"
- "python3-psycopg2"
- "unzip"

superuser:
    username: postgres
    password: postgres

replicauser:
    username: replicator
    password: replicator

postgresql_conf:
  autovacuum_worker_slots: 16
  autovacuum_work_mem: -1
  cluster_name: "'{{ pg_version }}/main'"
  data_directory: "'{{ pg_data }}'"
  datestyle: "'iso, mdy'"
  default_text_search_config: "'pg_catalog.english'"
  dynamic_shared_memory_type: posix
  external_pid_file: "'/var/run/postgresql/{{ pg_version }}-main.pid'"
  hba_file: "'/etc/postgresql/{{ pg_version }}/main/pg_hba.conf'"
  huge_page_size: 0
  huge_pages: try
  ident_file: "'/etc/postgresql/{{ pg_version }}/main/pg_ident.conf'"
  include_dir: "'conf.d'"
  lc_messages: "'en_US.UTF-8'"
  lc_monetary: "'en_US.UTF-8'"
  lc_numeric: "'en_US.UTF-8'"
  lc_time: "'en_US.UTF-8'"
  listen_addresses: "'*'"
  log_line_prefix: "'%m [%p] %q%u@%d '"
  log_timezone: "'Etc/UTC'"
  max_connections: 1000
  max_replication_slots: 5
  max_wal_senders: 5
  max_wal_size: 1GB
  min_wal_size: 80MB
  port: 5432
  shared_buffers: "{{ (ansible_memtotal_mb * 0.25) | int }}MB"
  ssl: on
  ssl_cert_file: "'/etc/ssl/certs/ssl-cert-snakeoil.pem'"
  ssl_key_file: "'/etc/ssl/private/ssl-cert-snakeoil.key'"
  timezone: "'Etc/UTC'"
  unix_socket_directories: "'/var/run/postgresql'"
  wal_keep_size: '1GB'
  wal_level: replica
  work_mem: 4MB

pg_hba:
- local all all peer
- host all all 0.0.0.0/0 scram-sha-256
- host replication replicator 0.0.0.0/0 scram-sha-256
- host all all ::0/0 scram-sha-256
